<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — CourtVisionLabs.ai</title>
  <link rel="icon" type="image/png" href="https://images.squarespace-cdn.com/content/v1/69fd01288c8d8d348d1d6fb6/a20cc7e9-091f-4bb4-838c-c6976e5a6705/57126B91-8AE3-4317-B2BD-38DD697F82B4.png?format=100w">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <img src="https://images.squarespace-cdn.com/content/v1/69fd01288c8d8d348d1d6fb6/a20cc7e9-091f-4bb4-838c-c6976e5a6705/57126B91-8AE3-4317-B2BD-38DD697F82B4.png?format=1500w" alt="CourtVisionLabs.ai">
      </a>
      <nav class="site-nav" id="siteNav">
        <a href="store.html">Store</a>
        <a href="/">Home</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <a href="cart.html" class="cart-link">Cart</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span>
      </button>
    </div>
  </header>

  <main>
    <section class="page-section section-light">
      <div class="container split-grid">
        <div class="split-text">
          <h1 class="section-title">Ready to Dominate the Numbers?</h1>
          <p>Fill out the form, unleash real-time insights, and crush your competition today. Let&rsquo;s connect and power up your performance.</p>
          <form class="contact-form" action="https://api.web3forms.com/submit" method="POST" data-form>
            <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_ACCESS_KEY">
            <input type="hidden" name="subject" value="Contact from courtvisionlabs.ai">
            <input type="checkbox" name="botcheck" class="honeypot" tabindex="-1" autocomplete="off">
            <div class="form-row">
              <div class="form-field"><label for="fname">First Name <span class="req">*</span></label><input type="text" id="fname" name="first_name" required></div>
              <div class="form-field"><label for="lname">Last Name <span class="req">*</span></label><input type="text" id="lname" name="last_name" required></div>
            </div>
            <div class="form-field"><label for="email">Email <span class="req">*</span></label><input type="email" id="email" name="email" required></div>
            <div class="form-field"><label for="message">Message <span class="req">*</span></label><textarea id="message" name="message" rows="5" required></textarea></div>
            <button type="submit" class="btn btn-dark">Send</button>
            <p class="form-status" data-form-status></p>
          </form>
        </div>
        <div class="split-image">
          <img src="https://images.squarespace-cdn.com/content/v1/69fd01288c8d8d348d1d6fb6/1726013121.182716-TPVAMBLEZISBJDTENVTB/imgg-od3-csm1kh9v.png?format=2500w" alt="CourtVisionLabs analytics" loading="lazy">
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-col"><h4>courtvisionlabs.ai</h4></div>
      <div class="footer-col footer-col-right"><h4><a href="mailto:Hello@courtvisionlabs.ai">Hello@courtvisionlabs.ai</a></h4></div>
    </div>
  </footer>

  <script src="scripts.js" defer></script>
</body>
</html>
